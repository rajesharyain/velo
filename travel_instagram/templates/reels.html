<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} — Velo</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-dim: #2563a8;
      --danger: #f87171;
      --radius: 10px;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .site-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border); }
    .nav-link.active {
      color: var(--text);
      background: var(--surface);
      border-color: var(--border);
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.25rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .toolbar label { font-size: 0.8rem; color: var(--muted); margin-right: 0.35rem; }
    .seg {
      display: inline-flex;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .seg button {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .seg button:hover { color: var(--text); }
    .seg button.on {
      background: var(--accent-dim);
      color: #fff;
    }
    .btn-export {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-export:hover { filter: brightness(1.06); }
    .count { font-size: 0.85rem; color: var(--muted); }
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .view-cards .table-wrap { display: none; }
    .view-table .cards-grid { display: none; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card video {
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: 320px;
      object-fit: cover;
      background: #000;
      display: block;
    }
    .card .no-video {
      aspect-ratio: 9 / 16;
      max-height: 320px;
      background: #111923;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1rem;
      text-align: center;
    }
    .card-body { padding: 1rem 1.05rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .card-title { font-weight: 600; font-size: 1rem; margin: 0; line-height: 1.35; }
    .card-theme { font-size: 0.8rem; color: var(--muted); margin: 0; }
    .card-tags {
      font-size: 0.82rem;
      color: #a8b8cc;
      word-break: break-word;
      margin: 0;
    }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: auto; padding-top: 0.5rem; }
    .card-links { margin-top: 0.35rem; }
    .card-links a {
      color: var(--accent);
      font-size: 0.8rem;
      margin-right: 0.75rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      text-align: left;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      background: #141c28;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(61, 156, 245, 0.06); }
    .cell-title { font-weight: 500; max-width: 200px; }
    .cell-theme { color: var(--muted); max-width: 220px; }
    .cell-tags { max-width: 280px; word-break: break-word; color: #a8b8cc; }
    .badge-miss { color: var(--danger); font-size: 0.75rem; }

    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .err { color: var(--danger); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="wrap view-cards" id="page-root">
    {% include "_nav.html" %}
    <h1>{{ title }}</h1>
    <p class="sub">Every row comes from <code>output/carousel/&lt;run&gt;/summary.json</code>. Newest first.</p>

    <div class="toolbar">
      <div>
        <label>Layout</label>
        <div class="seg" role="group" aria-label="Layout">
          <button type="button" id="btn-cards" class="on">Cards</button>
          <button type="button" id="btn-table">Table</button>
        </div>
      </div>
      <a class="btn-export" href="/api/reels/export.xlsx" id="link-export">Download Excel</a>
      <span class="count" id="reel-count"></span>
    </div>

    <p id="load-status" class="sub"><span class="spinner"></span>Loading reels…</p>
    <p id="load-err" class="err" hidden></p>

    <div id="empty" class="empty-state" hidden>No reels yet. Go to <a href="/" style="color:var(--accent);">Create</a> to generate one.</div>

    <div class="cards-grid" id="cards-root" hidden></div>
    <div class="table-wrap" id="table-root" hidden>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Theme</th>
            <th>Hashtags</th>
            <th>Generated</th>
            <th>Reel</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const root = document.getElementById("page-root");
    const btnCards = document.getElementById("btn-cards");
    const btnTable = document.getElementById("btn-table");
    const loadStatus = document.getElementById("load-status");
    const loadErr = document.getElementById("load-err");
    const empty = document.getElementById("empty");
    const cardsRoot = document.getElementById("cards-root");
    const tableRoot = document.getElementById("table-root");
    const tableBody = document.getElementById("table-body");
    const reelCount = document.getElementById("reel-count");

    const VIEW_KEY = "velo_reels_view";

    function setView(mode) {
      const isTable = mode === "table";
      root.classList.toggle("view-table", isTable);
      root.classList.toggle("view-cards", !isTable);
      btnTable.classList.toggle("on", isTable);
      btnCards.classList.toggle("on", !isTable);
      try { localStorage.setItem(VIEW_KEY, mode); } catch (_) {}
    }

    btnCards.addEventListener("click", () => setView("cards"));
    btnTable.addEventListener("click", () => setView("table"));

    try {
      const saved = localStorage.getItem(VIEW_KEY);
      if (saved === "table") setView("table");
    } catch (_) {}

    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function render(reels) {
      loadStatus.hidden = true;
      reelCount.textContent = reels.length ? reels.length + " reel" + (reels.length === 1 ? "" : "s") : "";

      if (!reels.length) {
        empty.hidden = false;
        cardsRoot.hidden = true;
        tableRoot.hidden = true;
        return;
      }

      empty.hidden = true;
      cardsRoot.hidden = false;
      tableRoot.hidden = false;

      cardsRoot.innerHTML = "";
      reels.forEach((r) => {
        const card = document.createElement("article");
        card.className = "card";
        const media = document.createElement("div");
        if (r.reel_video_url && r.reel_exists) {
          const v = document.createElement("video");
          v.src = r.reel_video_url;
          v.controls = true;
          v.playsInline = true;
          v.preload = "metadata";
          media.appendChild(v);
        } else {
          const ph = document.createElement("div");
          ph.className = "no-video";
          ph.textContent = r.reel_exists === false && r.reel_filename
            ? "Video file missing on disk"
            : "No preview";
          media.appendChild(ph);
        }
        card.appendChild(media);

        const body = document.createElement("div");
        body.className = "card-body";
        const h = document.createElement("p");
        h.className = "card-title";
        h.textContent = r.title || "(no title)";
        body.appendChild(h);
        const th = document.createElement("p");
        th.className = "card-theme";
        th.textContent = r.theme || "—";
        body.appendChild(th);
        const tg = document.createElement("p");
        tg.className = "card-tags";
        tg.textContent = r.hashtags || "—";
        body.appendChild(tg);
        const meta = document.createElement("p");
        meta.className = "card-meta";
        meta.textContent = r.generated_at || "";
        body.appendChild(meta);
        const links = document.createElement("div");
        links.className = "card-links";
        if (r.summary_json_url) {
          const a = document.createElement("a");
          a.href = r.summary_json_url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = "summary.json";
          links.appendChild(a);
        }
        body.appendChild(links);
        card.appendChild(body);
        cardsRoot.appendChild(card);
      });

      tableBody.innerHTML = "";
      reels.forEach((r) => {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td class=\"cell-title\">" + esc(r.title || "—") + "</td>" +
          "<td class=\"cell-theme\">" + esc(r.theme || "—") + "</td>" +
          "<td class=\"cell-tags\">" + esc(r.hashtags || "—") + "</td>" +
          "<td>" + esc(r.generated_at || "—") + "</td>" +
          "<td>" + (r.reel_video_url && r.reel_exists
            ? "<a href=\"" + esc(r.reel_video_url) + "\">Open</a>"
            : "<span class=\"badge-miss\">" + (r.reel_filename ? "missing" : "—") + "</span>") +
          "</td>";
        tableBody.appendChild(tr);
      });
    }

    (async () => {
      try {
        const res = await fetch("/api/reels");
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          loadErr.hidden = false;
          loadErr.textContent = data.detail || res.statusText || "Failed to load reels";
          loadStatus.hidden = true;
          return;
        }
        render(data.reels || []);
      } catch (e) {
        loadErr.hidden = false;
        loadErr.textContent = e.message || "Network error";
        loadStatus.hidden = true;
      }
    })();
  </script>
</body>
</html>
